apiVersion: batch/v1
kind: Job
metadata:
  name: forkwise-ingest
  namespace: forkwise-data
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: ghcr.io/itsnotaka/forkwise-ingest:demo
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: forkwise-data-config
          env:
            - name: OS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: OS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
