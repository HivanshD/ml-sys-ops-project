apiVersion: batch/v1
kind: CronJob
metadata:
  name: batch-pipeline
  namespace: forkwise-data
spec:
  schedule: "0 2 * * *"
  suspend: true
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: batch
              image: ghcr.io/itsnotaka/forkwise-batch:demo
              imagePullPolicy: Always
              command: ["python", "batch_pipeline.py"]
              envFrom:
                - configMapRef:
                    name: forkwise-data-config
              env:
                - name: OS_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: access-key
                - name: OS_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: secret-key
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
